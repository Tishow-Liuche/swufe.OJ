services:
  # ========== 基础设施 ==========

  postgres:
    image: postgres:16-alpine
    container_name: oj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in config/infra.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in config/infra.env}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in config/infra.env}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oj -d oj_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oj-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in config/infra.env}
      --protected-mode yes
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in config/infra.env}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: oj-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER in config/infra.env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in config/infra.env}
    ports:
      - "127.0.0.1:9000:9000" # S3 API
      - "127.0.0.1:9001:9001" # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== 评测沙箱 ==========

  go-judge:
    build:
      context: ./docker/go-judge
      dockerfile: Dockerfile
    image: oj-go-judge:latest
    container_name: oj-go-judge
    privileged: true
    restart: unless-stopped
    ulimits:
      nproc: 65535
      nofile: 65535
    pids_limit: -1
    command: >
      -http-addr 0.0.0.0:5050
      -enable-metrics
      -parallelism 2
      -tmp-fs-param size=256m,nr_inodes=8k
      -output-limit 268435456
      -copy-out-limit 67108864
      -force-gc-target 20971520
      -force-gc-interval 5s
      -pre-fork 0
    ports:
      - "127.0.0.1:5050:5050"
      - "127.0.0.1:5052:5052"
    shm_size: 512m

volumes:
  postgres_data:
  redis_data:
  minio_data:
  judge_cache:
