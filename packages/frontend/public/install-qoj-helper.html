<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>安装 QOJ Helper 脚本</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 20px; line-height: 1.8; color: #333; }
    .btn { display: inline-block; padding: 12px 28px; background: #2563eb; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 600; margin: 12px 0; }
    .note { background: #fff3cd; padding: 10px 14px; border-left: 4px solid #f39c12; border-radius: 4px; margin: 12px 0; }
    textarea { width: 100%; height: 320px; font-family: Consolas, monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>安装 QOJ Helper 脚本</h1>
  <div class="note">
    <b>用途：</b>在 OJ 提交 QOJ 普通单文件题后，自动打开 QOJ、选择语言、填入代码、点击 Submit、回传评测结果并关闭 QOJ 标签页。
  </div>
  <p>多文件题、交互题、Output Only 第一版不会自动提交，会在 QOJ 页面提示。</p>
  <a class="btn" href="qoj-helper.user.js">安装 QOJ Helper</a>
  <h2>手动安装</h2>
  <textarea id="code" readonly onclick="this.select()"></textarea>
  <script>
    fetch('qoj-helper.user.js').then(r => r.text()).then(t => {
      document.getElementById('code').textContent = t;
    });
  </script>
</body>
</html>
