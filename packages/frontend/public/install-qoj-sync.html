<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>安装 QOJ 题面同步脚本</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #1f2937; }
    .card { border: 1px solid #e5e7eb; border-radius: 14px; padding: 24px; box-shadow: 0 10px 30px rgba(15,23,42,.08); }
    a.btn { display: inline-block; margin-top: 12px; padding: 10px 18px; background: #2563eb; color: white; border-radius: 8px; text-decoration: none; font-weight: 700; }
    code { background: #f3f4f6; padding: 2px 6px; border-radius: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>安装 QOJ 题面同步脚本</h1>
    <p>安装后，打开任意 <code>https://qoj.ac/problem/题号</code> 页面，脚本会自动抓取题面并回传到本地 OJ。</p>
    <p>本脚本用于绕过后端直连 QOJ 可能遇到的 403 限制；它不会自动提交代码。</p>
    <a class="btn" href="/qoj-sync.user.js">安装 / 更新脚本</a>
  </div>
</body>
</html>
