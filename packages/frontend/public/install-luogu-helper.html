<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>安装 Luogu Helper 脚本</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 40px auto; padding: 20px; line-height: 1.8; color: #333; }
    .btn { display: inline-block; padding: 12px 28px; background: #27ae60; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; font-weight: 600; margin: 12px 0; }
    .btn:hover { background: #219a52; }
    .note { background: #fff3cd; padding: 10px 14px; border-left: 4px solid #f39c12; border-radius: 4px; margin: 12px 0; }
    textarea { width: 100%; height: 320px; font-family: Consolas, monospace; font-size: 12px; background: #1e1e1e; color: #d4d4d4; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; }
  </style>
</head>
<body>
  <h1>🔧 安装 Luogu Helper 脚本</h1>
  <div class="note">
    <b>用途：</b>在 OJ 提交洛谷题目后，自动打开洛谷、选择语言、填写代码、点击提交、回传评测结果并关闭洛谷标签页。
  </div>

  <h2>方法一：一键安装（推荐）</h2>
  <p>点击下面按钮，Tampermonkey 会弹出安装窗口：</p>
  <a class="btn" href="luogu-helper.user.js">📥 安装 Luogu Helper</a>

  <h2>方法二：手动安装</h2>
  <p>如果没有弹出安装窗口，打开 Tampermonkey → 添加新脚本 → 删除默认模板 → 粘贴下面完整代码 → Ctrl+S 保存。</p>
  <textarea id="code" readonly onclick="this.select()"></textarea>

  <script>
    fetch('luogu-helper.user.js').then(r => r.text()).then(t => {
      document.getElementById('code').textContent = t;
    });
  </script>
</body>
</html>
