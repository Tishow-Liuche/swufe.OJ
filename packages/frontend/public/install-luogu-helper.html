<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安装 Luogu Helper 脚本</title>
  <style>
    body {
      max-width: 820px;
      margin: 40px auto;
      padding: 20px;
      color: #1f2937;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", sans-serif;
      line-height: 1.8;
    }
    .btn {
      display: inline-block;
      margin: 14px 0;
      padding: 12px 28px;
      border-radius: 10px;
      background: #16a34a;
      color: #fff;
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
    }
    .note {
      margin: 14px 0;
      padding: 12px 16px;
      border-left: 4px solid #16a34a;
      border-radius: 8px;
      background: #f0fdf4;
    }
    .warn {
      border-left-color: #f59e0b;
      background: #fffbeb;
    }
    textarea {
      width: 100%;
      height: 320px;
      box-sizing: border-box;
      padding: 12px;
      border: 0;
      border-radius: 10px;
      background: #111827;
      color: #e5e7eb;
      font: 12px Consolas, Monaco, monospace;
    }
  </style>
</head>
<body>
  <h1>安装 Luogu Helper 脚本</h1>
  <div class="note">
    当前版本：<b>v1.3</b>。此版本修复“洛谷原站 AC，但本平台误回传 MLE”的问题：
    脚本只从评测状态区域识别 verdict，不再把题面/记录页中的 Memory Limit 当成 MLE。
  </div>
  <div class="note warn">
    如果 Tampermonkey 没有自动覆盖旧版本，请先删除旧的 <b>OJ Luogu Helper</b>，再点击下面按钮重新安装。
  </div>
  <a class="btn" href="luogu-helper.user.js">安装 / 更新 Luogu Helper</a>
  <h2>手动安装</h2>
  <p>如果浏览器没有自动打开 Tampermonkey 安装页，可以复制下面脚本内容，手动新建用户脚本。</p>
  <textarea id="code" readonly onclick="this.select()"></textarea>
  <script>
    fetch('luogu-helper.user.js').then(function (response) {
      return response.text();
    }).then(function (text) {
      document.getElementById('code').textContent = text;
    });
  </script>
</body>
</html>
