services:
  backend:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    image: swufe-oj:latest
    container_name: oj-backend
    restart: unless-stopped
    init: true
    env_file:
      - ${APP_ENV_FILE:-config/app.prod.env}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      go-judge:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s

  caddy:
    image: caddy:2.8-alpine
    container_name: oj-caddy
    restart: unless-stopped
    env_file:
      - ${PROXY_ENV_FILE:-config/proxy.env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
